<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nex — NexMover Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #222222;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --accent-glow: rgba(0,229,160,0.25);
  --text: #f0f0f0;
  --muted: #666;
  --user-bg: #00e5a0;
  --user-text: #0a0a0a;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 1.5rem;
  overflow: hidden;
}

/* ── BUBBLE TRIGGER ── */
#chat-trigger {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 58px;
  height: 58px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 0 var(--accent-glow);
  animation: pulse 2.5s infinite;
  transition: transform 0.2s;
  z-index: 9999;
}

#chat-trigger:hover { transform: scale(1.08); }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 var(--accent-glow); }
  70% { box-shadow: 0 0 0 14px rgba(0,229,160,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
}

#chat-trigger svg { width: 26px; height: 26px; fill: #0a0a0a; }
#chat-trigger .close-icon { display: none; }
#chat-trigger.open .chat-icon { display: none; }
#chat-trigger.open .close-icon { display: block; }

/* notification dot */
.notif-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 10px; height: 10px;
  background: #ff4444;
  border-radius: 50%;
  border: 2px solid var(--bg);
}

/* ── CHAT WINDOW ── */
#chat-window {
  position: fixed;
  bottom: 5rem;
  right: 1.5rem;
  width: 370px;
  height: 580px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,160,0.08);
  transform: scale(0.92) translateY(16px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  z-index: 9998;
}

#chat-window.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}

/* ── HEADER ── */
.chat-header {
  padding: 1rem 1.2rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.avatar-wrap {
  position: relative;
  width: 38px; height: 38px;
  flex-shrink: 0;
}

.avatar-wrap .av {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: #0a0a0a;
}

.online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  background: #00e5a0;
  border-radius: 50%;
  border: 2px solid var(--surface2);
}

.header-info { flex: 1; }

.header-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: -0.01em;
}

.header-status {
  font-size: 0.7rem;
  color: var(--accent);
  margin-top: 1px;
}

.header-badge {
  font-size: 0.62rem;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 0.2rem 0.5rem;
  border-radius: 999px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  display: flex;
  gap: 0.5rem;
  animation: msgIn 0.3s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
}

.msg.ai .msg-av { background: var(--accent); color: #0a0a0a; font-family: 'Syne', sans-serif; }
.msg.user .msg-av { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.bubble {
  max-width: 78%;
  padding: 0.65rem 0.9rem;
  font-size: 0.855rem;
  line-height: 1.6;
  border-radius: 12px;
}

.msg.ai .bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  color: var(--text);
}

.msg.user .bubble {
  background: var(--accent);
  color: #0a0a0a;
  border-bottom-right-radius: 3px;
  font-weight: 500;
}

/* quick replies */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.5rem;
  padding-left: 2rem;
}

.qr-btn {
  padding: 0.35rem 0.75rem;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 999px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}

.qr-btn:hover { background: var(--accent-dim); }

/* typing */
.typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
.typing-dots span {
  width: 6px; height: 6px;
  background: var(--muted);
  border-radius: 50%;
  animation: tdot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* order summary card */
.order-card {
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 0.75rem;
  margin-top: 0.5rem;
  font-size: 0.8rem;
  line-height: 1.7;
}

.order-card .oc-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--accent);
  font-size: 0.82rem;
  margin-bottom: 0.4rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.order-card .oc-row { display: flex; gap: 0.5rem; }
.order-card .oc-label { color: var(--muted); min-width: 70px; }
.order-card .oc-val { color: var(--text); }

.confirm-btns { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

.btn-confirm {
  flex: 1;
  padding: 0.5rem;
  background: var(--accent);
  color: #0a0a0a;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-confirm:hover { opacity: 0.88; }

.btn-edit {
  flex: 1;
  padding: 0.5rem;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-edit:hover { border-color: var(--text); color: var(--text); }

/* success */
.success-msg {
  text-align: center;
  padding: 1rem 0.5rem;
}
.success-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.success-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--accent);
  font-size: 0.95rem;
}
.success-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.5; }

/* ── INPUT ── */
.input-area {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  align-items: flex-end;
  background: var(--surface2);
}

#chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.85rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.855rem;
  color: var(--text);
  outline: none;
  resize: none;
  min-height: 38px;
  max-height: 100px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--muted); }

.send-btn {
  width: 38px; height: 38px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: #0a0a0a; }

/* powered by */
.powered {
  text-align: center;
  font-size: 0.62rem;
  color: #333;
  padding: 0.35rem;
  letter-spacing: 0.08em;
}

@media (max-width: 420px) {
  #chat-window { width: calc(100vw - 2rem); right: 1rem; bottom: 4.5rem; height: 70vh; }
  #chat-trigger { bottom: 1rem; right: 1rem; }
}
</style>
</head>
<body>

<!-- TRIGGER BUTTON -->
<button id="chat-trigger" onclick="toggleChat()">
  <div class="notif-dot"></div>
  <svg class="chat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <svg class="close-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- CHAT WINDOW -->
<div id="chat-window">
  <div class="chat-header">
    <div class="avatar-wrap">
      <div class="av">N</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Nex</div>
      <div class="header-status">● Online — সবসময় ready</div>
    </div>
    <div class="header-badge">NexMover AI</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by NexMover AI</div>
</div>

<script>
const WORKER_URL = "https://nexmover-ai-chatbot.syntaxe042.workers.dev";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRMgGHKhLT4bX4dLfPxgTr4AYqx9UQUevD3G8-GurKBvm6Rw9tKT5fxCJyxrksjeU/exec";
const BUSINESS_EMAIL = "info@nexmover.com";
const WHATSAPP = "8801616797214";

const SYSTEM_PROMPT = `You are Nex, the AI assistant for NexMover — a professional digital agency in Bangladesh offering WordPress web development and graphics design services.

Your personality: Friendly, professional, helpful. Speak in the same language the customer uses. If they write in Bangla, reply in Bangla. If English, reply in English. If Banglish, match that too.

Your goal: Understand what the customer needs, recommend the right package, collect their order details (name, service/package, contact number, email if available, requirements), then confirm the order.

=== SERVICES & PACKAGES ===

--- GRAPHICS DESIGN — Social Media & Brand Identity ---

1. Social Starter (Basic) — ৳3,000/month
   For: Freelancers, ছোট ব্যবসা
   Includes: 6টি Social Media Post (Facebook/Instagram), 1টি Story Template, Brand color ও font অনুযারী design, JPG + PNG delivery, 2 বার Revision, WhatsApp-এ delivery

2. Brand Boost (Best Seller) — ৳5,500/month
   For: Startup, SME, F-commerce
   Includes: Basic Brand Identity (Logo + Color + Font), Brand Guidelines (1 page), 13টি Social Media Post, 3টি Story Template, Facebook Cover + Profile Photo, Unlimited Revision (posts), JPG + PNG + PDF source, 7 কার্যদিবসে Brand delivery

3. Identity Pro (Pro) — ৳8,000/month
   For: SME, Agency, Rebranding
   Includes: Full Brand Identity (Logo, Color, Font, Pattern), Brand Guideline Booklet (4-5 pages), 22টি Social Media Post, 6টি Story + 3টি Reel Cover, Business Card Design, 1টি Promotional Banner/Flyer, Unlimited Revision, All formats source file (AI/PSD/PDF), 1 মাস After-Support

--- WORDPRESS WEB DESIGN PACKAGES ---

1. Web Starter (Basic) — ৳5,500 (একবার) — Domain + Hosting বাদে
   For: Freelancers, ছোট ব্যবসা
   Includes: 5 পেজের WordPress সাইট, Mobile Responsive Design, Premium Theme Setup, Contact Form + Google Map, Basic SEO Setup, WhatsApp Chat Button, 1 মাস ফ্রি সাপোর্ট, 7-10 কার্যদিবস ডেলিভারি

2. Business Pro (Best Seller) — ৳12,000 (একবার)
   For: Startup, SME, Service Business
   Includes: 10 পেজের Custom WordPress সাইট, Custom UI Design (Elementor Pro), Speed & Performance Optimization, Advanced SEO (RankMath Setup), Blog/Portfolio Section, WhatsApp + Messenger Chat, Google Analytics + FB Pixel, SSL + Basic Security, 3 মাস ফ্রি সাপোর্ট, 12-15 কার্যদিবস ডেলিভারি

3. E-commerce Lite (Pro) — ৳22,000 (একবার)
   For: F-commerce → Website, Online Shop
   Includes: WooCommerce E-commerce সাইট, 50টি পর্যন্ত Product Setup, bKash + Nagad + COD Payment, Product Filter + Search, Coupon/Discount System, Facebook Shop Integration, Full SEO + Speed Optimization, Admin প্যানেল ব্যবহার প্রশিক্ষণ, 6 মাস ফ্রি সাপোর্ট, 20-25 কার্যদিবস ডেলিভারি

=== ORDER COLLECTION FLOW ===
When customer is ready to order, collect:
1. Full name
2. Which service + package
3. Phone number (required)
4. Email (optional)
5. Brief project requirements

After collecting all info, output ONLY this exact JSON block (nothing else after it):
[ORDER_READY]{"name":"...","service":"...","package":"...","phone":"...","email":"...","requirements":"..."}[/ORDER_READY]

Do NOT ask for more than needed. Keep conversation natural and warm. If customer is unsure, help them choose the right package based on their needs and budget.`;

let chatHistory = [];
let isOpen = false;
let initialized = false;
let currentOrder = null;

// ── TOGGLE ──
function toggleChat() {
  isOpen = !isOpen;
  const win = document.getElementById('chat-window');
  const btn = document.getElementById('chat-trigger');
  win.classList.toggle('open', isOpen);
  btn.classList.toggle('open', isOpen);

  // remove notif dot
  const dot = btn.querySelector('.notif-dot');
  if (dot) dot.remove();

  if (isOpen && !initialized) {
    initialized = true;
    initChat();
  }
}

function initChat() {
  const greetings = [
    "হ্যালো! 👋 আমি Nex, NexMover-এর AI assistant। আপনাকে কীভাবে সাহায্য করতে পারি?\n\nআমরা offer করি:\n• 🎨 Graphics Design & Branding\n• 🌐 WordPress Web Development\n\nকোনটায় আগ্রহী?",
  ];

  addMessage('ai', greetings[0]);

  setTimeout(() => {
    addQuickReplies([
      '🎨 Graphics Design',
      '🌐 WordPress Website',
      'আমার বাজেট কম',
      'Package দেখতে চাই'
    ]);
  }, 400);
}

// ── UI HELPERS ──
function addMessage(role, text, skipHistory = false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avText = role === 'ai' ? 'N' : 'U';
  div.innerHTML = `
    <div class="msg-av">${avText}</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  if (!skipHistory) {
    chatHistory.push({ role: role === 'ai' ? 'model' : 'user', parts: [{ text }] });
  }
  return div;
}

function addQuickReplies(options) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      div.remove();
      handleUserInput(opt);
    };
    div.appendChild(btn);
  });
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-av">N</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showOrderCard(order) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">N</div><div class="bubble">
    <div>আপনার order summary:</div>
    <div class="order-card">
      <div class="oc-title">📋 Order Summary</div>
      <div class="oc-row"><span class="oc-label">নাম:</span><span class="oc-val">${order.name}</span></div>
      <div class="oc-row"><span class="oc-label">Service:</span><span class="oc-val">${order.service} — ${order.package}</span></div>
      <div class="oc-row"><span class="oc-label">Phone:</span><span class="oc-val">${order.phone}</span></div>
      ${order.email ? `<div class="oc-row"><span class="oc-label">Email:</span><span class="oc-val">${order.email}</span></div>` : ''}
      <div class="oc-row"><span class="oc-label">Details:</span><span class="oc-val">${order.requirements}</span></div>
      <div class="confirm-btns">
        <button class="btn-confirm" onclick="confirmOrder()">✅ Confirm Order</button>
        <button class="btn-edit" onclick="editOrder()">✏️ Edit</button>
      </div>
    </div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showSuccess() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">N</div><div class="bubble">
    <div class="success-msg">
      <div class="success-icon">🎉</div>
      <div class="success-title">Order Confirmed!</div>
      <div class="success-sub">আপনার order successfully নেওয়া হয়েছে।<br>NexMover team শীঘ্রই আপনার সাথে যোগাযোগ করবে।<br><br>📞 Direct contact: <strong>+8801616797214</strong></div>
    </div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── SEND ──
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  handleUserInput(text);
}

async function handleUserInput(text) {
  // remove any quick replies
  document.querySelectorAll('.quick-replies').forEach(el => el.remove());

  addMessage('user', text);
  document.getElementById('send-btn').disabled = true;
  addTyping();

  // add to history
  chatHistory.push({ role: 'user', parts: [{ text }] });

  try {
    const res = await fetch(WORKER_URL, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: chatHistory.slice(-20),
    generationConfig: { temperature: 0.7, maxOutputTokens: 600 }
  })
});

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "দুঃখিত, একটু সমস্যা হয়েছে। আবার চেষ্টা করুন।";

    removeTyping();

    // check for order data
    const orderMatch = reply.match(/\[ORDER_READY\](.*?)\[\/ORDER_READY\]/s);
    if (orderMatch) {
      try {
        currentOrder = JSON.parse(orderMatch[1]);
        const cleanReply = reply.replace(/\[ORDER_READY\].*?\[\/ORDER_READY\]/s, '').trim();
        if (cleanReply) addMessage('ai', cleanReply, true);
        chatHistory.push({ role: 'model', parts: [{ text: cleanReply || "Order summary নিচে দেখুন:" }] });
        showOrderCard(currentOrder);
      } catch(e) {
        addMessage('ai', reply.replace(/\[ORDER_READY\].*?\[\/ORDER_READY\]/s, '').trim());
      }
    } else {
      addMessage('ai', reply, true);
      chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    }

  } catch(err) {
    removeTyping();
    addMessage('ai', "দূঃখিত, এই মুহূর্তে ব্যস্ত আছি. ৩০ সেকেন্ড পর আবার চেস্টা করুন।🙏", true);
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

async function confirmOrder() {
  if (!currentOrder) return;

  // remove order card buttons
  document.querySelectorAll('.confirm-btns').forEach(el => el.remove());

  addTyping();

  try {
    // Save to Google Sheets
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: currentOrder.name,
        service: `${currentOrder.service} — ${currentOrder.package}`,
        budget: currentOrder.package,
        contact: currentOrder.phone,
        email: currentOrder.email || '',
        requirements: currentOrder.requirements
      })
    });

    // Send confirmation email via Apps Script
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'email',
        to: currentOrder.email || BUSINESS_EMAIL,
        name: currentOrder.name,
        service: `${currentOrder.service} — ${currentOrder.package}`,
        contact: currentOrder.phone,
        requirements: currentOrder.requirements
      })
    });

  } catch(e) { /* no-cors mode, ignore */ }

  removeTyping();
  showSuccess();
  currentOrder = null;
}

function editOrder() {
  document.querySelectorAll('.order-card').forEach(el => el.closest('.msg').remove());
  addMessage('ai', "কোন তথ্য পরিবর্তন করতে চান? বলুন, আমি update করে নেবো।", true);
  chatHistory.push({ role: 'model', parts: [{ text: "কোন তথ্য পরিবর্তন করতে চান?" }] });
}

// auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
